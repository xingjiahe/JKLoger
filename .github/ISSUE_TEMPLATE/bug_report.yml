name: Bug Report
description: File a bug report to help us improve JKLoger
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: JKLoger Version
      description: What version of JKLoger are you using?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What platform are you running on?
      options:
        - iOS
        - iOS Simulator
        - macOS (Catalyst)
    validations:
      required: true

  - type: input
    id: ios-version
    attributes:
      label: iOS Version
      description: What iOS version are you targeting?
      placeholder: "17.0"
    validations:
      required: true

  - type: input
    id: xcode-version
    attributes:
      label: Xcode Version
      description: What Xcode version are you using?
      placeholder: "15.0"
    validations:
      required: true

  - type: dropdown
    id: installation
    attributes:
      label: Installation Method
      description: How did you install JKLoger?
      options:
        - CocoaPods
        - Swift Package Manager
        - Manual Integration
        - Carthage
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure JKLoger with...
        2. Call JKLogInfo with...
        3. Observe that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code Sample
      description: Please provide a minimal code sample that reproduces the issue
      render: objc
      placeholder: |
        // Minimal code to reproduce the issue
        JKLogger *logger = [JKLogger sharedLogger];
        // ... your code here
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console Output
      description: If applicable, add console output or error messages
      render: text
      placeholder: Paste console output here...
    validations:
      required: false

  - type: textarea
    id: configuration
    attributes:
      label: JKLoger Configuration
      description: Please share your JKLoger configuration
      render: objc
      placeholder: |
        // Your JKLoger setup code
        JKLogger *logger = [JKLogger sharedLogger];
        logger.logLevel = JKLogLevelDebug;
        // ... rest of configuration
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, crash logs, etc.)
      placeholder: Any additional information...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided a minimal code sample that reproduces the issue
          required: false
        - label: I have included relevant console output or error messages
          required: false
        - label: I am using the latest version of JKLoger
          required: false